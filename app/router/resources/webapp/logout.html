<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Abgemeldet – Shopfloor Cockpit</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      font-family: "72", Arial, Helvetica, sans-serif;
      background: #f5f6f7;
      color: #1d2d3e;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
      padding: 2.5rem 3rem;
      max-width: 26rem;
      text-align: center;
    }
    .icon {
      width: 56px; height: 56px;
      margin: 0 auto 1rem;
      border-radius: 50%;
      background: #eef7ee;
      color: #2b7d2b;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }
    h1 { font-size: 1.4rem; margin: 0 0 .5rem; }
    p { color: #5b6b7b; line-height: 1.5; margin: 0 0 1.75rem; }
    a.btn {
      display: inline-block;
      background: #0a6ed1;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      padding: .7rem 1.6rem;
      border-radius: 8px;
    }
    a.btn:hover { background: #085caf; }
    .sub { margin-top: 1.5rem; font-size: .8rem; color: #8a94a0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h1>Sie sind abgemeldet</h1>
    <p>Ihre Sitzung im Shopfloor Cockpit wurde beendet. Melden Sie sich erneut an, um fortzufahren.</p>
    <a class="btn" href="/">Erneut anmelden</a>
    <div class="sub">Shopfloor Copilot · SAP BTP</div>
  </div>
</body>
</html>
